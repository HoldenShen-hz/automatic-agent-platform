# Local production-like compose profile.
# Resource and security limits are intentionally explicit so local smoke
# runs cannot hide unbounded CPU, memory, pid, or writable-root behavior.
# Production secrets must be supplied via environment/secret managers; do
# not commit concrete AA_API_JWT_SECRET or POSTGRES_PASSWORD values here.
# This repository intentionally does not carry a `docker-compose.override.yml`;
# compose merge semantics stay out of the baseline so local runs remain
# deterministic. Override locally with explicit `-f` arguments when needed.
# For immutable image promotion, pass a digest-qualified `AA_IMAGE_REF`.

services:
  api-server:
    image: ${AA_IMAGE_REF:-automatic-agent-platform:local}
    build:
      context: .
      target: runtime
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      AA_DB_PATH: /app/data/automatic-agent.db
      AA_STORAGE_DRIVER: ${AA_STORAGE_DRIVER:-sqlite}
      AA_STORAGE_POSTGRES_DSN: ${AA_STORAGE_POSTGRES_DSN:-}
      AA_REDIS_HOST: redis
      AA_REDIS_PORT: "6379"
      AA_REDIS_PASSWORD: ${AA_REDIS_PASSWORD:?required}
    volumes:
      - automatic-agent-data:/app/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/healthz', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    stop_grace_period: 30s
    mem_limit: 512m
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - automatic-agent-network

  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: automatic_agent
      POSTGRES_USER: automatic_agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - automatic-agent-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automatic_agent -d automatic_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    pids_limit: 256
    networks:
      - automatic-agent-network

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command:
      - redis-server
      - --appendonly
      - "no"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --requirepass
      - ${AA_REDIS_PASSWORD:?required}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${AA_REDIS_PASSWORD:?required}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - automatic-agent-network

  prometheus:
    image: prom/prometheus:v3.5.3@sha256:3472eaf38a47d53edd57d2b04073210a48a278b5e21300e5b556441800cfa503
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/rules:/etc/prometheus/rules:ro
    depends_on:
      api-server:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - automatic-agent-network

  alertmanager:
    image: prom/alertmanager:v0.32.1@sha256:7f188886b63dd41789f5cb2ee4c719f8281f65d8ce8ebef2fc80656ece98c512
    command:
      - /bin/sh
      - /etc/alertmanager/render-alertmanager-config.sh
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./deploy/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml.tmpl:ro
      - ./deploy/prometheus/render-alertmanager-config.sh:/etc/alertmanager/render-alertmanager-config.sh:ro
    depends_on:
      api-server:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - automatic-agent-network

volumes:
  automatic-agent-data:
    driver: local
  automatic-agent-postgres:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${AA_POSTGRES_DATA_DIR:-./data/docker/postgres}

networks:
  automatic-agent-network:
    driver: bridge
    internal: true
