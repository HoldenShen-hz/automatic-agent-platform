id: support
version: 1
name: Support Division
description: Customer support, troubleshooting, issue resolution, help desk.
priority: 25
default_workflow: support_single_step
orchestration_workflow: support_single_step
triggers:
  - support
  - help
  - troubleshoot
  - issue
  - problem
  - error
  - fix
  - resolve
roles:
  - id: support_agent
    name: Support Agent
    prompt: roles/support/agent.prompt.md
    model: balanced
    tools: [read, bash]
    max_instances: 5
  - id: l2_support
    name: L2 Support Engineer
    prompt: roles/support/l2_engineer.prompt.md
    model: reasoning
    tools: [read, bash]
    max_instances: 3
# §37: ResourceBoundaries - Execution limits for the division
resource_boundaries:
  max_concurrent_executions: 5
  max_queue_depth: 25
  execution_timeout_ms: 300000
  max_retry_attempts: 2
  budget_limit_per_task: 3
# §37: FaultDomains - Fault isolation and recovery configuration
fault_domains:
  isolation_level: standard
  retry_policy: standard
  fallback_enabled: true
  blast_radius: team
  recovery_strategy: resume
