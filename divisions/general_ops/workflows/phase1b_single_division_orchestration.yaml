id: phase1b_single_division_orchestration
division_id: general_ops
steps:
  - step_id: intake_triage
    role_id: intake_router
    output_key: triage
    output_schema: schemas/minimal-output.json
    timeout_ms: 60000
    max_attempts: 1
    compensation_model: idempotent_replay
  - step_id: draft_solution
    role_id: general_executor
    input_keys: [triage]
    output_key: draft
    output_schema: schemas/minimal-output.json
    timeout_ms: 180000
    max_attempts: 2
    depends_on: [intake_triage]
    compensation_model: idempotent_replay
  - step_id: final_review
    role_id: workflow_planner
    input_keys: [draft]
    output_key: final
    output_schema: schemas/minimal-output.json
    timeout_ms: 90000
    max_attempts: 1
    depends_on: [draft_solution]
    compensation_model: idempotent_replay
