id: financial_services_primary
division_id: financial-services
steps:
  - step_id: collect_customer_context
    role_id: finserv_specialist
    output_key: context_result
    output_schema: schemas/finserv-output.json
    timeout_ms: 180000
    max_attempts: 1
  - step_id: perform_policy_checks
    role_id: finserv_specialist
    output_key: policy_result
    output_schema: schemas/finserv-output.json
    timeout_ms: 300000
    max_attempts: 2
    depends_on:
      - collect_customer_context
  - step_id: prepare_advice_packet
    role_id: finserv_specialist
    output_key: advice_result
    output_schema: schemas/finserv-output.json
    timeout_ms: 180000
    max_attempts: 1
    depends_on:
      - perform_policy_checks
  - step_id: route_for_approval
    role_id: finserv_specialist
    output_key: approval_result
    output_schema: schemas/finserv-output.json
    timeout_ms: 120000
    max_attempts: 1
    depends_on:
      - prepare_advice_packet
