id: legal_primary
division_id: legal
steps:
  - step_id: collect_authorities
    role_id: legal_specialist
    output_key: authority_result
    output_schema: schemas/legal-output.json
    timeout_ms: 180000
    max_attempts: 1
  - step_id: review_clause_set
    role_id: legal_specialist
    output_key: clause_result
    output_schema: schemas/legal-output.json
    timeout_ms: 300000
    max_attempts: 2
    depends_on:
      - collect_authorities
  - step_id: draft_redlines
    role_id: legal_specialist
    output_key: redline_result
    output_schema: schemas/legal-output.json
    timeout_ms: 300000
    max_attempts: 1
    depends_on:
      - review_clause_set
  - step_id: prepare_approval_packet
    role_id: legal_specialist
    output_key: approval_result
    output_schema: schemas/legal-output.json
    timeout_ms: 180000
    max_attempts: 1
    depends_on:
      - draft_redlines
