id: security
version: 1
name: Security Division
description: Security auditing, vulnerability assessment, compliance checking, secure coding.
priority: 60
default_workflow: security_single_step
orchestration_workflow: security_single_step
triggers:
  - security
  - vulnerability
  - audit
  - CVE
  - compliance
  - secure
  - pentest
// §37: Vertical business domain structured hierarchy
domain_descriptors:
  - domainId: content-moderation
    ownerOrgNodeId: org.safety
    primaryEntities: [content, policies, enforcement_records]
    recipeArchetype: moderation
    lifecycleState: canary
  - domainId: financial-services
    ownerOrgNodeId: org.finserv
    primaryEntities: [customer_context, policy_checks, advice_packets]
    recipeArchetype: compliance
    lifecycleState: shadow
  - domainId: healthcare
    ownerOrgNodeId: org.health
    primaryEntities: [clinical_context, guidelines, summaries]
    recipeArchetype: compliance
    lifecycleState: shadow
  - domainId: legal
    ownerOrgNodeId: org.legal
    primaryEntities: [contracts, clauses, redlines, approval_packets]
    recipeArchetype: compliance
    lifecycleState: shadow
risk_profiles:
  - profileId: content-moderation.risk
    domainId: content-moderation
    riskLevel: high
    advisoryOnly: false
    humanAccountable: true
    deterministicHotPathOnly: false
    regulatoryClass: regulated
  - profileId: financial-services.risk
    domainId: financial-services
    riskLevel: critical
    advisoryOnly: false
    humanAccountable: true
    deterministicHotPathOnly: true
    regulatoryClass: heavily_regulated
  - profileId: healthcare.risk
    domainId: healthcare
    riskLevel: critical
    advisoryOnly: true
    humanAccountable: true
    deterministicHotPathOnly: true
    regulatoryClass: heavily_regulated
  - profileId: legal.risk
    domainId: legal
    riskLevel: critical
    advisoryOnly: true
    humanAccountable: true
    deterministicHotPathOnly: true
    regulatoryClass: heavily_regulated
eval_specs:
  - domainId: content-moderation
    evalBaselines: [policy_precision, appeal_reversal_rate]
    criticalCases: [false_positive, false_negative, policy_mismatch]
    acceptanceThresholds:
      policy_precision: 0.92
      appeal_reversal_rate: 0.05
    adversarialScenarios: [adversarial_content, policy_evasion, coordinated_abuse]
  - domainId: financial-services
    evalBaselines: [policy_compliance, suitability]
    criticalCases: [regulation_breach, unsuitable_recommendation, missing_disclosure]
    acceptanceThresholds:
      policy_compliance: 0.96
      suitability: 0.95
    adversarialScenarios: [regulatory_change, product_mismatch, conflict_of_interest]
  - domainId: healthcare
    evalBaselines: [clinical_safety, guideline_adherence]
    criticalCases: [incorrect_summary, guideline_mismatch, privacy_breach]
    acceptanceThresholds:
      clinical_safety: 0.98
      guideline_adherence: 0.96
    adversarialScenarios: [contradictory_guidelines, data_quality_issue, edge_case_patient]
  - domainId: legal
    evalBaselines: [policy_alignment, approval_completeness]
    criticalCases: [clause_omission, incorrect_redline, missing_authority]
    acceptanceThresholds:
      policy_alignment: 0.96
      approval_completeness: 0.98
    adversarialScenarios: [contract_risk, authority_issue, conflicting_terms]
roles:
  - id: security_analyst
    name: Security Analyst
    prompt: roles/security/analyst.prompt.md
    model: reasoning
    tools: [read, bash, web_search]
    max_instances: 2
  - id: compliance_officer
    name: Compliance Officer
    prompt: roles/security/compliance.prompt.md
    model: balanced
    tools: [read]
    max_instances: 2
