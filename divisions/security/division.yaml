id: security
version: 1
name: Security Division
description: Security auditing, vulnerability assessment, compliance checking, secure coding.
priority: 60
default_workflow: security_single_step
orchestration_workflow: security_single_step
triggers:
  - security
  - vulnerability
  - audit
  - CVE
  - compliance
  - secure
  - pentest
roles:
  - id: security_analyst
    name: Security Analyst
    prompt: roles/security/analyst.prompt.md
    model: reasoning
    tools: [read, bash, web_search]
    max_instances: 2
  - id: compliance_officer
    name: Compliance Officer
    prompt: roles/security/compliance.prompt.md
    model: balanced
    tools: [read]
    max_instances: 2
# §37: DomainDescriptor
domain_descriptor:
  domainId: security
  ownerOrgNodeId: org.security
  primaryEntities:
    - vulnerability
    - finding
    - control
    - incident
  recipeArchetype: compliance
  lifecycleState: active
# §37: DomainRiskProfile
risk_profile:
  profileId: security.risk
  domainId: security
  riskLevel: critical
  advisoryOnly: false
  humanAccountable: true
  deterministicHotPathOnly: true
  regulatoryClass: heavily_regulated
# §37: DomainEvalSpec
eval_spec:
  domainId: security
  evalBaselines:
    - finding_precision
    - policy_coverage
  criticalCases:
    - secret_exposure
    - privilege_escalation
    - missed_cve
  acceptanceThresholds:
    finding_precision: 90
    policy_coverage: 95
    false_negative_rate: 90
  adversarialScenarios:
    - prompt_injection
    - control_bypass
    - supply_chain_attack
# §37: ResourceBoundaries - Execution limits for the division
resource_boundaries:
  max_concurrent_executions: 2
  max_queue_depth: 10
  execution_timeout_ms: 480000
  max_retry_attempts: 2
  budget_limit_per_task: 6
# §37: FaultDomains - Fault isolation and recovery configuration
fault_domains:
  isolation_level: elevated
  retry_policy: standard
  fallback_enabled: true
  blast_radius: department
  recovery_strategy: resume
