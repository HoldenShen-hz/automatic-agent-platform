id: engineering_ops
version: 1
name: Engineering Operations
description: Handles software implementation, fixes, and code review workflows.
priority: 50
default_workflow: engineering_single_agent_minimal
orchestration_workflow: engineering_multi_step_delivery
triggers:
  - code
  - coding
  - implement
  - fix
  - bugfix
  - refactor
roles:
  - id: engineer
    name: Engineer
    prompt: roles/engineer.prompt.md
    model: coding
    tools: [read, edit, bash]
    max_instances: 4
  - id: reviewer
    name: Reviewer
    prompt: roles/reviewer.prompt.md
    model: reasoning
    tools: [read]
    max_instances: 2
# §37: ResourceBoundaries - Execution limits for the division
resource_boundaries:
  max_concurrent_executions: 4
  max_queue_depth: 20
  execution_timeout_ms: 900000
  max_retry_attempts: 2
  budget_limit_per_task: 8
# §37: FaultDomains - Fault isolation and recovery configuration
fault_domains:
  isolation_level: elevated
  retry_policy: standard
  fallback_enabled: true
  blast_radius: department
  recovery_strategy: resume
