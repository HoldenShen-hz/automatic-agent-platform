id: design
version: 1
name: Design Division
description: UI/UX design, system design, architecture planning, prototyping.
priority: 35
default_workflow: design_single_step
orchestration_workflow: design_single_step
triggers:
  - design
  - UI
  - UX
  - prototype
  - wireframe
  - mockup
  - architecture
  - system design
roles:
  - id: designer
    name: Designer
    prompt: roles/design/designer.prompt.md
    model: balanced
    tools: [read, write]
    max_instances: 3
  - id: ux_researcher
    name: UX Researcher
    prompt: roles/design/ux_researcher.prompt.md
    model: balanced
    tools: [read, web_search]
    max_instances: 2
# §37: ResourceBoundaries - Execution limits for the division
resource_boundaries:
  max_concurrent_executions: 3
  max_queue_depth: 10
  execution_timeout_ms: 300000
  max_retry_attempts: 2
  budget_limit_per_task: 3
# §37: FaultDomains - Fault isolation and recovery configuration
fault_domains:
  isolation_level: standard
  retry_policy: standard
  fallback_enabled: true
  blast_radius: team
  recovery_strategy: resume
