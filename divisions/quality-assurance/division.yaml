id: quality-assurance
version: 1
name: Quality Assurance Division
description: Validation planning, regression oversight, and release quality certification.
priority: 45
default_workflow: quality_assurance_primary
triggers:
  - quality assurance
  - QA
  - testing
  - validation
  - regression
roles:
  - id: qa_engineer
    name: QA Engineer
    prompt: roles/qa_engineer.prompt.md
    model: balanced
    tools: [test_manager, regression_runner, defect_tracker, coverage_analyzer, performance_profiler]
    max_instances: 3
  - id: release_certifier
    name: Release Certifier
    prompt: roles/qa_engineer.prompt.md
    model: reasoning
    tools: [coverage_analyzer, defect_tracker, performance_profiler]
    max_instances: 2
# §37: DomainDescriptor
domain_descriptor:
  domainId: quality-assurance
  ownerOrgNodeId: org.qa
  primaryEntities:
    - test
    - defect
    - coverage
    - release
  recipeArchetype: compliance
  lifecycleState: canary
# §37: DomainRiskProfile
risk_profile:
  profileId: quality-assurance.risk
  domainId: quality-assurance
  riskLevel: high
  advisoryOnly: false
  humanAccountable: true
  deterministicHotPathOnly: false
  regulatoryClass: unregulated
# §37: DomainEvalSpec
eval_spec:
  domainId: quality-assurance
  evalBaselines:
    - regression_rate
    - quality_gate
  criticalCases:
    - production_defect
    - missed_regression
  acceptanceThresholds:
    regression_rate: 90
    quality_gate: 90
    coverage: 80
  adversarialScenarios:
    - test_gaming
    - false_positive
# §37: ResourceBoundaries - Execution limits for the division
resource_boundaries:
  max_concurrent_executions: 3
  max_queue_depth: 15
  execution_timeout_ms: 480000
  max_retry_attempts: 2
  budget_limit_per_task: 6
# §37: FaultDomains - Fault isolation and recovery configuration
fault_domains:
  isolation_level: elevated
  retry_policy: standard
  fallback_enabled: true
  blast_radius: department
  recovery_strategy: resume
