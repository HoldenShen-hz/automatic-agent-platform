id: analytics
version: 1
name: Analytics Division
description: Business intelligence, metrics analysis, KPI tracking, reporting.
priority: 30
default_workflow: analytics_single_step
orchestration_workflow: analytics_single_step
triggers:
  - analytics
  - metrics
  - KPI
  - dashboard
  - report
  - business intelligence
  - trends
roles:
  - id: bi_analyst
    name: BI Analyst
    prompt: roles/bi_analyst.prompt.md
    model: balanced
    tools: [read, bash]
    max_instances: 3
# §37: ResourceBoundaries - Execution limits for the division
resource_boundaries:
  max_concurrent_executions: 3
  max_queue_depth: 10
  execution_timeout_ms: 300000
  max_retry_attempts: 2
  budget_limit_per_task: 3
# §37: FaultDomains - Fault isolation and recovery configuration
fault_domains:
  isolation_level: standard
  retry_policy: standard
  fallback_enabled: true
  blast_radius: team
  recovery_strategy: resume
