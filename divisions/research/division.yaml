id: research
version: 1
name: Research Division
description: Technical research, literature review, competitive analysis, data analysis, research reports.
priority: 40
default_workflow: research_single_step
orchestration_workflow: research_orchestration
triggers:
  - research
  - survey
  - investigate
  - analyze
  - compare
  - review
  - literature
  - competitive analysis
roles:
  - id: lead_researcher
    name: Lead Researcher
    prompt: roles/research/lead.prompt.md
    model: reasoning
    tools: [read, web_search, web_fetch]
    max_instances: 2
  - id: researcher
    name: Researcher
    prompt: roles/research/researcher.prompt.md
    model: balanced
    tools: [read, web_search, web_fetch]
    max_instances: 4
  - id: data_analyst
    name: Data Analyst
    prompt: roles/research/data_analyst.prompt.md
    model: balanced
    tools: [read, bash]
    max_instances: 2
# §37: ResourceBoundaries - Execution limits for the division
resource_boundaries:
  max_concurrent_executions: 4
  max_queue_depth: 20
  execution_timeout_ms: 600000
  max_retry_attempts: 2
  budget_limit_per_task: 5
# §37: FaultDomains - Fault isolation and recovery configuration
fault_domains:
  isolation_level: standard
  retry_policy: standard
  fallback_enabled: true
  blast_radius: team
  recovery_strategy: resume
