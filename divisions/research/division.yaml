id: research
version: 1
name: Research Division
description: Technical research, literature review, competitive analysis, data analysis, research reports.
priority: 40
default_workflow: research_single_step
orchestration_workflow: research_orchestration
triggers:
  - research
  - survey
  - investigate
  - analyze
  - compare
  - review
  - literature
  - competitive analysis
// §37: Vertical business domain structured hierarchy
domain_descriptors:
  - domainId: data-engineering
    ownerOrgNodeId: org.data
    primaryEntities: [datasets, pipelines, schemas, lineage]
    recipeArchetype: analytics
    lifecycleState: canary
  - domainId: knowledge-base
    ownerOrgNodeId: org.knowledge
    primaryEntities: [documents, chunks, citations, answers]
    recipeArchetype: research
    lifecycleState: canary
  - domainId: industry-research
    ownerOrgNodeId: org.strategy
    primaryEntities: [sources, signals, competitor_data, briefs]
    recipeArchetype: research
    lifecycleState: canary
  - domainId: academic-research
    ownerOrgNodeId: org.research
    primaryEntities: [papers, citations, evidence, findings]
    recipeArchetype: research
    lifecycleState: canary
risk_profiles:
  - profileId: data-engineering.risk
    domainId: data-engineering
    riskLevel: medium
    advisoryOnly: false
    humanAccountable: false
    deterministicHotPathOnly: false
    regulatoryClass: lightly_regulated
  - profileId: knowledge-base.risk
    domainId: knowledge-base
    riskLevel: medium
    advisoryOnly: false
    humanAccountable: false
    deterministicHotPathOnly: false
    regulatoryClass: lightly_regulated
  - profileId: industry-research.risk
    domainId: industry-research
    riskLevel: medium
    advisoryOnly: false
    humanAccountable: false
    deterministicHotPathOnly: false
    regulatoryClass: unregulated
  - profileId: academic-research.risk
    domainId: academic-research
    riskLevel: medium
    advisoryOnly: false
    humanAccountable: false
    deterministicHotPathOnly: false
    regulatoryClass: unregulated
eval_specs:
  - domainId: data-engineering
    evalBaselines: [data_freshness, schema_validity]
    criticalCases: [pipeline_failure, data_corruption, lineage_break]
    acceptanceThresholds:
      data_freshness: 0.95
      schema_validity: 0.99
    adversarialScenarios: [upstream_system_down, schema_drift, data_poisoning]
  - domainId: knowledge-base
    evalBaselines: [citation_coverage, freshness]
    criticalCases: [misinformation, outdated_content, retrieval_failure]
    acceptanceThresholds:
      citation_coverage: 0.90
      freshness: 0.85
    adversarialScenarios: [poisoned_knowledge, retrieval_failure, context_collapse]
  - domainId: industry-research
    evalBaselines: [source_relevance, citation_coverage]
    criticalCases: [incorrect_analysis, biased_sources, outdated_intelligence]
    acceptanceThresholds:
      source_relevance: 0.88
      citation_coverage: 0.85
    adversarialScenarios: [selective_evidence, competitor_bias, stale_data]
  - domainId: academic-research
    evalBaselines: [citation_accuracy, coverage]
    criticalCases: [plagiarism, incorrect_citations, predatory_journals]
    acceptanceThresholds:
      citation_accuracy: 0.98
      coverage: 0.90
    adversarialScenarios: [paper_mill_content, predatory_journals, halo_effect]
roles:
  - id: lead_researcher
    name: Lead Researcher
    prompt: roles/research/lead.prompt.md
    model: reasoning
    tools: [read, web_search, web_fetch]
    max_instances: 2
  - id: researcher
    name: Researcher
    prompt: roles/research/researcher.prompt.md
    model: balanced
    tools: [read, web_search, web_fetch]
    max_instances: 4
  - id: data_analyst
    name: Data Analyst
    prompt: roles/research/data_analyst.prompt.md
    model: balanced
    tools: [read, bash]
    max_instances: 2
