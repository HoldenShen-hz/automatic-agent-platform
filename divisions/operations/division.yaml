id: operations
version: 1
name: Operations
description: Runbook execution, incident response, and monitoring review for SRE and DevOps tasks.
priority: 20
default_workflow: ops_orchestration
orchestration_workflow: ops_orchestration
disambiguate:
  deployment:
    when:
      - context: [incident, runbook, health_check, diagnose, sre]
        prefer: operations
      - context: [CI, CD, pipeline, infrastructure, kubernetes, docker, dockerfile]
        prefer: devops
  monitoring:
    when:
      - context: [incident, runbook, health_check, diagnose, sre]
        prefer: operations
      - context: [infrastructure, kubernetes, docker, pipeline, deployment]
        prefer: devops
triggers:
  - incident
  - runbook
  - monitoring
  - deployment
  - health_check
  - diagnose
  - sre
roles:
  - id: ops_executor
    name: Operations Executor
    prompt: roles/ops_executor.prompt.md
    model: balanced
    tools: [read, bash, diagnose, fetch_logs, knowledge_retrieve]
    max_instances: 5
  - id: ops_incident_responder
    name: Incident Responder
    prompt: roles/ops_incident_responder.prompt.md
    model: reasoning
    tools: [read, bash, diagnose, fetch_logs, execute, patch, knowledge_retrieve]
    max_instances: 3
# §37: ResourceBoundaries - Execution limits for the division
resource_boundaries:
  max_concurrent_executions: 5
  max_queue_depth: 20
  execution_timeout_ms: 480000
  max_retry_attempts: 2
  budget_limit_per_task: 5
# §37: FaultDomains - Fault isolation and recovery configuration
fault_domains:
  isolation_level: elevated
  retry_policy: standard
  fallback_enabled: true
  blast_radius: department
  recovery_strategy: resume
