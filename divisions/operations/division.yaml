id: operations
version: 1
name: Supply Chain Division
description: Inventory optimization, logistics scheduling, procurement, supplier management, demand forecasting.
priority: 50
default_workflow: ops_orchestration
orchestration_workflow: ops_orchestration
triggers:
  - supply chain
  - inventory
  - logistics
  - procurement
  - supplier
  - forecasting
  - route planning
# §37: DomainDescriptor - Supply Chain vertical business domain
domain_descriptor:
  domainId: supply-chain
  ownerOrgNodeId: org.supply
  primaryEntities:
    - purchase_orders
    - inventory
    - routes
    - suppliers
    - shipments
  recipeArchetype: logistics
  lifecycleState: canary
# §37: DomainRiskProfile - Supply Chain risk classification
risk_profile:
  profileId: supply-chain.risk
  domainId: supply-chain
  riskLevel: high
  advisoryOnly: false
  humanAccountable: false
  deterministicHotPathOnly: false
  regulatoryClass: regulated
# §37: DomainEvalSpec - Supply Chain evaluation framework
eval_spec:
  domainId: supply-chain
  evalBaselines:
    - fill_rate
    - on_time_delivery
    - inventory_accuracy
  criticalCases:
    - stockout
    - delivery_failure
    - quality_issue
    - supplier_delay
  acceptanceThresholds:
    fill_rate: 92
    on_time_delivery: 95
    inventory_accuracy: 90
  adversarialScenarios:
    - demand_spike
    - supplier_failure
    - logistics_bottleneck
    - counterfeit_parts
roles:
  - id: supply_chain_manager
    name: Supply Chain Manager
    prompt: roles/ops_executor.prompt.md
    model: balanced
    tools: [read, bash]
    max_instances: 3
