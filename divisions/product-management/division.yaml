id: product-management
version: 1
name: Product Management Division
description: Product discovery, roadmap shaping, requirements synthesis, and release coordination.
priority: 40
default_workflow: product_management_primary
triggers:
  - product management
  - roadmap
  - requirements
  - product discovery
  - specification
roles:
  - id: product_manager
    name: Product Manager
    prompt: roles/product_manager.prompt.md
    model: balanced
    tools: [roadmap_planner, requirements_editor, feedback_synthesizer, experiment_tracker, release_calendar]
    max_instances: 3
# §37: DomainDescriptor
domain_descriptor:
  domainId: product-management
  ownerOrgNodeId: org.product
  primaryEntities:
    - feature
    - requirement
    - roadmap
    - release
  recipeArchetype: crud_heavy
  lifecycleState: canary
# §37: DomainRiskProfile
risk_profile:
  profileId: product-management.risk
  domainId: product-management
  riskLevel: medium
  advisoryOnly: false
  humanAccountable: false
  deterministicHotPathOnly: false
  regulatoryClass: unregulated
# §37: DomainEvalSpec
eval_spec:
  domainId: product-management
  evalBaselines:
    - requirement_quality
    - roadmap_alignment
  criticalCases:
    - scope_creep
    - missed_milestone
  acceptanceThresholds:
    requirement_quality: 85
    roadmap_alignment: 80
    cycle_time: 75
  adversarialScenarios:
    - scope_manipulation
    - priority_gaming
# §37: ResourceBoundaries - Execution limits for the division
resource_boundaries:
  max_concurrent_executions: 3
  max_queue_depth: 15
  execution_timeout_ms: 600000
  max_retry_attempts: 2
  budget_limit_per_task: 4
# §37: FaultDomains - Fault isolation and recovery configuration
fault_domains:
  isolation_level: standard
  retry_policy: standard
  fallback_enabled: true
  blast_radius: team
  recovery_strategy: resume
