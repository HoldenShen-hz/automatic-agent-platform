id: product_management_primary
division_id: product-management
steps:
  - step_id: collect_signals
    role_id: product_manager
    output_key: signals_result
    output_schema: schemas/pm-output.json
    timeout_ms: 180000
    max_attempts: 1
  - step_id: define_requirements
    role_id: product_manager
    output_key: requirements_result
    output_schema: schemas/pm-output.json
    timeout_ms: 300000
    max_attempts: 2
    depends_on:
      - collect_signals
  - step_id: prioritize_scope
    role_id: product_manager
    output_key: priority_result
    output_schema: schemas/pm-output.json
    timeout_ms: 180000
    max_attempts: 1
    depends_on:
      - define_requirements
  - step_id: prepare_release_brief
    role_id: product_manager
    output_key: brief_result
    output_schema: schemas/pm-output.json
    timeout_ms: 120000
    max_attempts: 1
    depends_on:
      - prioritize_scope
