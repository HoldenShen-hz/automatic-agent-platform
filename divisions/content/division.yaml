id: content
version: 1
name: Content Division
description: Article writing, copywriting, translation, SEO optimization, content operations.
priority: 30
default_workflow: content_single_step
orchestration_workflow: content_single_step
triggers:
  - write
  - article
  - blog
  - content
  - copywriting
  - translate
  - SEO
roles:
  - id: editor
    name: Editor
    prompt: roles/content/editor.prompt.md
    model: reasoning
    tools: [read, web_search, write]
    max_instances: 2
  - id: writer
    name: Writer
    prompt: roles/content/writer.prompt.md
    model: balanced
    tools: [read, web_search, write]
    max_instances: 4
  - id: translator
    name: Translator
    prompt: roles/content/translator.prompt.md
    model: balanced
    tools: [read]
    max_instances: 2
# §37: ResourceBoundaries - Execution limits for the division
resource_boundaries:
  max_concurrent_executions: 4
  max_queue_depth: 12
  execution_timeout_ms: 300000
  max_retry_attempts: 2
  budget_limit_per_task: 3
# §37: FaultDomains - Fault isolation and recovery configuration
fault_domains:
  isolation_level: standard
  retry_policy: standard
  fallback_enabled: true
  blast_radius: team
  recovery_strategy: resume
