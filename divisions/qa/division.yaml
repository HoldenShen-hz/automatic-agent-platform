id: qa
version: 1
name: QA Smoke Validation Division
description: Legacy QA alias reserved for lightweight smoke validation and quick regression triage; full release certification belongs to quality-assurance.
priority: 30
default_plan_blueprint_ref: plan://divisions/qa/default
orchestration_plan_blueprint_ref: plan://divisions/qa/smoke-orchestration
default_workflow: qa_smoke_validation
orchestration_workflow: qa_smoke_validation
triggers:
  - bug
  - smoke test
  - smoke validation
  - quick regression
  - qa smoke
roles:
  - id: qa_engineer
    name: QA Smoke Engineer
    prompt: roles/qa_engineer.prompt.md
    model: balanced
    tools: [read, bash]
    max_instances: 3
  - id: test_architect
    name: Test Architect
    prompt: roles/test_architect.prompt.md
    model: reasoning
    tools: [read]
    max_instances: 2
# §37: DomainDescriptor
domain_descriptor:
  domainId: qa
  ownerOrgNodeId: org.qa.smoke
  primaryEntities:
    - smoke_suite
    - regression_signal
    - defect
    - release_candidate
  recipeArchetype: validation
  lifecycleState: active
# §37: DomainRiskProfile
risk_profile:
  profileId: qa.risk
  domainId: qa
  riskLevel: medium
  advisoryOnly: true
  humanAccountable: true
  deterministicHotPathOnly: true
  regulatoryClass: unregulated
# §37: DomainEvalSpec
eval_spec:
  domainId: qa
  evalBaselines:
    - smoke_pass_rate
    - regression_detection
  criticalCases:
    - release_blocker_missed
    - flaky_signal_masked
  acceptanceThresholds:
    smoke_pass_rate: 90
    regression_detection: 85
    turnaround_time: 90
  adversarialScenarios:
    - flaky_suite_bias
    - false_green
# §37: ResourceBoundaries - Execution limits for the division
resource_boundaries:
  max_concurrent_executions: 3
  max_queue_depth: 15
  execution_timeout_ms: 480000
  max_retry_attempts: 2
  budget_limit_per_task: 4
# §37: FaultDomains - Fault isolation and recovery configuration
fault_domains:
  isolation_level: standard
  retry_policy: standard
  fallback_enabled: true
  blast_radius: team
  recovery_strategy: resume
