id: qa
version: 1
name: QA Division
description: Test planning, test automation, quality assurance, bug reporting.
priority: 40
default_workflow: qa_single_step
orchestration_workflow: qa_single_step
triggers:
  - test
  - testing
  - QA
  - quality
  - bug
  - verification
  - validation
roles:
  - id: qa_engineer
    name: QA Engineer
    prompt: roles/qa/engineer.prompt.md
    model: balanced
    tools: [read, bash]
    max_instances: 3
  - id: test_architect
    name: Test Architect
    prompt: roles/qa/architect.prompt.md
    model: reasoning
    tools: [read]
    max_instances: 2
