id: qa
version: 1
name: QA Division
description: Test planning, test automation, quality assurance, bug reporting.
priority: 40
default_workflow: qa_single_step
orchestration_workflow: qa_single_step
// §171-1994: resource_boundaries and fault_domains for runtime isolation and quota enforcement
resource_boundaries:
  max_concurrent_tasks: 15
  max_workflow_duration_ms: 3600000
  memory_limit_mb: 1024
  compute_quota: "qa-standard"
fault_domains:
  - test_execution
  - quality_assurance
  - bug_reporting
triggers:
  - test
  - testing
  - QA
  - quality
  - bug
  - verification
  - validation
// §171-1996: Disambiguation rules for overlap with engineering_ops division on "bug" trigger
disambiguate:
  - trigger: bug
    conditions:
      - context: ["triage", "regression", "test_failure"]
        priority_boost: 15
    notes: "QA owns bug_triage context; engineering_ops owns code_fix context"
// §37: Vertical business domain structured hierarchy
domain_descriptors:
  - domainId: quality-assurance
    ownerOrgNodeId: org.qa
    primaryEntities: [test_plans, regression_suites, defects, releases]
    recipeArchetype: adversarial
    lifecycleState: canary
risk_profiles:
  - profileId: quality-assurance.risk
    domainId: quality-assurance
    riskLevel: high
    advisoryOnly: false
    humanAccountable: false
    deterministicHotPathOnly: false
    regulatoryClass: unregulated
eval_specs:
  - domainId: quality-assurance
    evalBaselines: [regression_rate, quality_gate]
    criticalCases: [regression_miss, false_negative, release_blocker_miss]
    acceptanceThresholds:
      regression_rate: 0.95
      quality_gate: 0.92
    adversarialScenarios: [flaky_test, environment_inconsistency, coverage_gaming]
roles:
  - id: qa_engineer
    name: QA Engineer
    prompt: roles/qa/engineer.prompt.md
    model: balanced
    tools: [read, bash]
    max_instances: 3
  - id: test_architect
    name: Test Architect
    prompt: roles/qa/architect.prompt.md
    model: reasoning
    tools: [read]
    max_instances: 2
