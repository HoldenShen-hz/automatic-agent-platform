id: qa
version: 1
name: QA Division
description: Test planning, test automation, quality assurance, bug reporting.
priority: 40
default_workflow: qa_single_step
orchestration_workflow: qa_single_step
triggers:
  - test
  - testing
  - QA
  - quality
  - bug
  - verification
  - validation
roles:
  - id: qa_engineer
    name: QA Engineer
    prompt: roles/qa/engineer.prompt.md
    model: balanced
    tools: [read, bash]
    max_instances: 3
  - id: test_architect
    name: Test Architect
    prompt: roles/qa/architect.prompt.md
    model: reasoning
    tools: [read]
    max_instances: 2
# §37: ResourceBoundaries - Execution limits for the division
resource_boundaries:
  max_concurrent_executions: 3
  max_queue_depth: 15
  execution_timeout_ms: 480000
  max_retry_attempts: 2
  budget_limit_per_task: 4
# §37: FaultDomains - Fault isolation and recovery configuration
fault_domains:
  isolation_level: standard
  retry_policy: standard
  fallback_enabled: true
  blast_radius: team
  recovery_strategy: resume
