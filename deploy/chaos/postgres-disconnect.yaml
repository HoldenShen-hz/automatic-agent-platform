apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: automatic-agent-postgres-disconnect
spec:
  action: partition
  mode: all
  selector:
    labelSelectors:
      app.kubernetes.io/name: automatic-agent
  direction: to
  target:
    selector:
      labelSelectors:
        app.kubernetes.io/component: postgres
    mode: all
  duration: "60s"
