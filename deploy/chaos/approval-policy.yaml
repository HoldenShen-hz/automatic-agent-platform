apiVersion: automatic-agent.io/v1
kind: ChaosApprovalPolicy
metadata:
  name: default-chaos-approval
  labels:
    app.kubernetes.io/managed-by: gitops
  annotations:
    automatic-agent.io/owner: platform-sre
spec:
  requiredApprovers: 2
  allowedWindows:
    - name: business-hours-controlled
      timezone: UTC
      days: ["Mon", "Tue", "Wed", "Thu"]
      start: "09:00"
      end: "16:00"
  blockedTargets:
    - prod-control-plane
    - prod-primary-database
  maxAffectedPercent: 10
  autoRollbackOnViolation: true
