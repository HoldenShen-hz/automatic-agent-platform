global:
  resolve_timeout: 5m

route:
  receiver: ops-null
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: pagerduty-critical
    - matchers:
        - severity="warning"
      receiver: slack-warning
    - matchers:
        - severity="page"
      receiver: pagerduty-critical

receivers:
  - name: ops-null

  - name: slack-warning
    slack_configs:
      - url: __SLACK_WEBHOOK_URL__
        send_resolved: true

  - name: pagerduty-critical
    pagerduty_configs:
      - service_key: __PAGERDUTY_SERVICE_KEY__
        send_resolved: true
