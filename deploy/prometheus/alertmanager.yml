global:
  resolve_timeout: 5m

route:
  receiver: ops-null
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: pagerduty-critical
    - matchers:
        - severity="warning"
      receiver: slack-warning
    - matchers:
        - severity="page"
      receiver: pagerduty-critical

receivers:
  - name: ops-null

  - name: slack-warning
    slack_configs:
      - url: ${SLACK_WEBHOOK_URL}
        send_resolved: true

  - name: pagerduty-critical
    pagerduty_configs:
      - service_key: ${PAGERDUTY_SERVICE_KEY}
        send_resolved: true
