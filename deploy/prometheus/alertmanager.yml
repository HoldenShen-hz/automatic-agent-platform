global:
  resolve_timeout: 5m

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname", "job"]

route:
  receiver: slack-default
  group_by: ["alertname", "job"]
  group_wait: 15s
  group_interval: 2m
  repeat_interval: 2h
  routes:
    - matchers:
        - severity="critical"
      receiver: pagerduty-critical
    - matchers:
        - severity="warning"
      receiver: slack-warning
    - matchers:
        - severity="page"
      receiver: pagerduty-critical

receivers:
  - name: ops-null

  - name: slack-default
    slack_configs:
      - url: __SLACK_WEBHOOK_URL__
        send_resolved: true

  - name: slack-warning
    slack_configs:
      - url: __SLACK_WEBHOOK_URL__
        send_resolved: true

  - name: pagerduty-critical
    pagerduty_configs:
      - service_key: __PAGERDUTY_SERVICE_KEY__
        send_resolved: true
