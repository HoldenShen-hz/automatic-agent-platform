groups:
  - name: automatic-agent
    rules:
      # High Error Rate - SLO: error rate < 1%
      - alert: AutomaticAgentHighErrorRate
        expr: sum(rate(http_requests_total{status=~"5.."}[5m])) / clamp_min(sum(rate(http_requests_total[5m])), 1) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: automatic-agent 5xx error rate exceeds 1% SLO
          description: HTTP 5xx ratio has exceeded 1% for 5 minutes. SLO target is < 1%.

      # High Latency - SLO: p95 latency < 1s
      - alert: AutomaticAgentHighLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_ms_bucket[5m])) by (le)) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: automatic-agent p95 latency exceeds 1s SLO
          description: HTTP request p95 latency has exceeded 1 second for 5 minutes.

      - alert: AutomaticAgentCriticalLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_ms_bucket[5m])) by (le)) > 3000
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: automatic-agent p95 latency exceeds 3s
          description: HTTP request p95 latency has exceeded 3 seconds. Immediate investigation required.

      # Queue Depth High
      - alert: AutomaticAgentQueueDepthHigh
        expr: sum(queued_tasks) > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: automatic-agent queue depth exceeds 100
          description: Task queue depth has exceeded 100 entries for 10 minutes.

      - alert: AutomaticAgentQueueBacklog
        expr: sum(queued_tasks) > 500
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: automatic-agent queue backlog critical
          description: Task queue depth has exceeded 500 entries. System is overwhelmed.

      # Worker Pool Exhaustion
      - alert: AutomaticAgentWorkerPoolExhaustion
        expr: sum(active_executions) / clamp_min(sum(total_workers), 1) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: automatic-agent worker pool above 90% utilization
          description: Worker pool utilization has exceeded 90% for 5 minutes.

      - alert: AutomaticAgentWorkerPoolCritical
        expr: sum(active_executions) / clamp_min(sum(total_workers), 1) > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: automatic-agent worker pool above 95% utilization
          description: Worker pool utilization has exceeded 95%. New tasks may be delayed.

      # Task Execution Timeout Rate
      - alert: AutomaticAgentTaskTimeoutRate
        expr: sum(rate(task_executions_total{status="timeout"}[10m])) / clamp_min(sum(rate(task_executions_total[10m])), 1) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: automatic-agent task timeout rate exceeds 5%
          description: Task timeouts have exceeded 5% over 10 minutes.

      # Outbox Pending Entries Growing
      - alert: AutomaticAgentOutboxGrowing
        expr: outbox_pending > 100
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: automatic-agent outbox entries growing
          description: Outbox pending entries have increased by more than 100 in the last 15 minutes.

      - alert: AutomaticAgentOutboxBacklog
        expr: outbox_pending > 1000
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: automatic-agent outbox backlog critical
          description: Outbox has over 1000 pending entries. Event delivery may be delayed.

      # DLQ Entries Accumulating
      - alert: AutomaticAgentDLQAccumulating
        expr: dead_letter_count > 10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: automatic-agent DLQ entries accumulating
          description: Dead letter queue has received more than 10 entries in 30 minutes.

      - alert: AutomaticAgentDLQCritical
        expr: dead_letter_count > 100
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: automatic-agent DLQ backlog critical
          description: Dead letter queue has over 100 entries. Immediate investigation required.

      # Existing alerts preserved
      - alert: AutomaticAgentTaskFailureRate
        expr: sum(rate(task_executions_total{status="failed"}[10m])) / clamp_min(sum(rate(task_executions_total[10m])), 1) > 0.10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: task failure rate is above 10%
          description: Task executions are failing above the warning threshold.

      - alert: AutomaticAgentMemoryPressure
        expr: process_meminfo_bytes{type="rss"} > 536870912
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: automatic-agent RSS exceeds 512MiB
          description: Resident memory has stayed above the configured pressure threshold.

      - alert: AutomaticAgentRedisDisconnected
        expr: sum(redis_connection_errors) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: automatic-agent observed Redis connection errors
          description: Redis-backed subsystems have reported connection errors in the last evaluation window.

      - alert: AutomaticAgentEventLoopLag
        expr: event_loop_lag_ms > 250
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: automatic-agent event loop lag exceeds 250ms
          description: Event loop lag remained above 250ms for 5 minutes.

      - alert: AutomaticAgentDiskUsageHigh
        expr: disk_used_ratio > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: automatic-agent disk usage exceeds 85%
          description: Workspace filesystem usage is above 85% and may impact runtime stability.

      - alert: AutomaticAgentWorkerHeartbeatTimeout
        expr: total_workers > 0 and healthy_workers < total_workers
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: automatic-agent has unhealthy workers
          description: At least one worker has stopped heartbeating or is marked unhealthy.

      # Orchestration Queue Latency
      - alert: AutomaticAgentOrchestrationLatency
        expr: histogram_quantile(0.95, sum(rate(oapeflir_stage_duration_ms_bucket[5m])) by (le)) > 2000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: automatic-agent orchestration step p95 exceeds 2s
          description: Multi-step orchestration p95 latency has exceeded 2 seconds.
