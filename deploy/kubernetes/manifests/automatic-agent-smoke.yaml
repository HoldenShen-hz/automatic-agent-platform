apiVersion: apps/v1
kind: Deployment
metadata:
  name: automatic-agent-smoke
  labels:
    app.kubernetes.io/name: automatic-agent-platform
    app.kubernetes.io/component: smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: automatic-agent-platform
      app.kubernetes.io/component: smoke
  template:
    metadata:
      labels:
        app.kubernetes.io/name: automatic-agent-platform
        app.kubernetes.io/component: smoke
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/automatic-agent/automatic-agent-platform:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: AA_STORAGE_DRIVER
              value: sqlite
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: automatic-agent-smoke
spec:
  selector:
    app.kubernetes.io/name: automatic-agent-platform
    app.kubernetes.io/component: smoke
  ports:
    - name: http
      port: 3000
      targetPort: 3000
