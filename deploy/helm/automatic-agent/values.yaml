# Default values for automatic-agent.

nameOverride: automatic-agent

replicaCount: 1

image:
  registry: ghcr.io
  repository: automatic-agent-platform
  pullPolicy: IfNotPresent
  tag: ""  # Overridden by CI
  digest: ""

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""  # Defaults to release name
  automountServiceAccountToken: false

service:
  type: ClusterIP
  port: 3000
  metricsPort: 9090

metricsService:
  enabled: true
  type: ClusterIP
  annotations: {}

rolloutStrategy: rolling

canary:
  weight: 10
  byHeader: ""
  byHeaderValue: ""

ingress:
  enabled: false
  className: nginx
  annotations: {}
  domain: localhost
  hosts: []
  tls: []
  requireTls: false

resources:
  limits:
    cpu: "1"
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  customMetrics: []
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

podDisruptionBudget:
  enabled: false
  minAvailable: 1

monitoring:
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
  prometheusRule:
    enabled: true
    interval: 30s

resourceQuota:
  enabled: true
  pods: "10"
  persistentVolumeClaims: "10"
  servicesLoadBalancers: "2"
  servicesNodePorts: "4"
  requestsCpu: "4"
  requestsMemory: 4Gi
  limitsCpu: "8"
  limitsMemory: 8Gi

limitRange:
  enabled: true
  default:
    cpu: "1"
    memory: 512Mi
  defaultRequest:
    cpu: 250m
    memory: 256Mi

env:
  AA_API_HOST: "0.0.0.0"
  AA_API_PORT: "3000"
  AA_METRICS_PORT: "9090"
  AA_LOG_LEVEL: "info"
  AA_STORAGE_DRIVER: "sqlite"
  NODE_ENV: "production"
  AA_OTEL_ENABLED: "false"
  AA_OTEL_SERVICE_NAME: "automatic-agent"

secrets:
  allowInlineSecrets: false
  AA_API_JWT_SECRET: ""
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  MINIMAX_API_KEY: ""
  AA_STORAGE_POSTGRES_DSN: ""

externalSecret:
  enabled: false
  refreshInterval: 1h
  secretStoreRef:
    name: automatic-agent-secret-store
    kind: ClusterSecretStore
  data:
    - secretKey: AA_API_JWT_SECRET
      remoteRef:
        key: automatic-agent/api
        property: jwt_secret
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: automatic-agent/providers
        property: openai_api_key
    - secretKey: AA_STORAGE_POSTGRES_DSN
      remoteRef:
        key: automatic-agent/storage
        property: postgres_dsn

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  mountPath: /app/data
  volumeMode: Filesystem

livenessProbe:
  enabled: true
  tcpSocket:
    port: 3000
  initialDelaySeconds: 0
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /healthz
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  enabled: true
  httpGet:
    path: /healthz
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 60

terminationGracePeriodSeconds: 30

lifecycle:
  preStopSleepSeconds: 5

nodeSelector: {}

tolerations: []

affinity: {}

topologySpreadConstraints: []

networkPolicy:
  enabled: true
  metricsIngressNamespaceSelectors:
    - kubernetes.io/metadata.name: monitoring

crds:
  enabled: true
