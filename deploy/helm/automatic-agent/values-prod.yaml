# Production values for automatic-agent

replicaCount: 3

image:
  repository: ghcr.io/holdenshen-hz/automatic-agent-platform
  pullPolicy: Always
  tag: ""  # Set by CI from image_tag

resources:
  limits:
    cpu: "2"
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  domain: ""
  hosts: []
  tls:
    - secretName: automatic-agent-prod-tls
      hosts: []

env:
  AA_API_HOST: "0.0.0.0"
  AA_API_PORT: "3000"
  AA_METRICS_PORT: "9090"
  AA_LOG_LEVEL: "info"
  AA_STORAGE_DRIVER: "postgres"
  NODE_ENV: "production"

externalSecret:
  enabled: true
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  data:
    - secretKey: AA_API_JWT_SECRET
      remoteRef:
        key: automatic-agent/prod/api
        property: jwt_secret
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: automatic-agent/prod/providers
        property: openai_api_key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: automatic-agent/prod/providers
        property: anthropic_api_key

persistence:
  enabled: true
  storageClass: gp3
  size: 50Gi

podDisruptionBudget:
  enabled: true
  minAvailable: 2
