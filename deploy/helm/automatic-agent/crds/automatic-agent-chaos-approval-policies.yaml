apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: chaosapprovalpolicies.automatic-agent.io
spec:
  group: automatic-agent.io
  scope: Cluster
  names:
    plural: chaosapprovalpolicies
    singular: chaosapprovalpolicy
    kind: ChaosApprovalPolicy
    shortNames:
      - chaospolicy
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - requiredApprovers
                - allowedWindows
                - blockedTargets
                - maxAffectedPercent
                - autoRollbackOnViolation
              properties:
                requiredApprovers:
                  type: integer
                  minimum: 1
                allowedWindows:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                      - timezone
                      - days
                      - start
                      - end
                    properties:
                      name:
                        type: string
                      timezone:
                        type: string
                      days:
                        type: array
                        items:
                          type: string
                      start:
                        type: string
                      end:
                        type: string
                blockedTargets:
                  type: array
                  items:
                    type: string
                maxAffectedPercent:
                  type: integer
                  minimum: 1
                  maximum: 100
                autoRollbackOnViolation:
                  type: boolean
      subresources:
        status: {}
