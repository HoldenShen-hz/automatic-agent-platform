{{- if .Values.metricsService.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "automatic-agent.fullname" . }}-metrics
  labels:
    {{- include "automatic-agent.labels" . | nindent 4 }}
  {{- with .Values.metricsService.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.metricsService.type }}
  ports:
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "automatic-agent.selectorLabels" . | nindent 4 }}
{{- end }}
