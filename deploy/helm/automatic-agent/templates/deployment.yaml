{{- if le (int .Values.terminationGracePeriodSeconds) (int .Values.lifecycle.preStopSleepSeconds) }}
{{- fail "terminationGracePeriodSeconds must be greater than lifecycle.preStopSleepSeconds" }}
{{- end }}
{{- if and .Values.persistence.enabled (eq (.Values.env.AA_STORAGE_DRIVER | default "sqlite") "sqlite") (or (gt (int .Values.replicaCount) 1) (and .Values.autoscaling.enabled (gt (int .Values.autoscaling.maxReplicas) 1))) }}
{{- if not (has "ReadWriteMany" .Values.persistence.accessModes) }}
{{- fail "sqlite persistence requires replicaCount=1 and autoscaling.maxReplicas=1 unless ReadWriteMany storage is explicitly configured" }}
{{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "automatic-agent.fullname" . }}
  labels:
    {{- include "automatic-agent.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "automatic-agent.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "automatic-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "automatic-agent.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $imageRegistry := trimSuffix "/" (.Values.image.registry | default "") }}
      {{- $imageRepository := trimPrefix "/" .Values.image.repository }}
      {{- $resolvedImage := $imageRepository }}
      {{- if ne $imageRegistry "" }}
      {{- $resolvedImage = printf "%s/%s" $imageRegistry $imageRepository }}
      {{- end }}
      {{- $imageRef := printf "%s:%s" $resolvedImage (.Values.image.tag | default .Chart.AppVersion) }}
      {{- if .Values.image.digest }}
      {{- $imageRef = printf "%s@%s" $resolvedImage .Values.image.digest }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ $imageRef }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if and .Values.persistence.enabled (eq (.Values.env.AA_STORAGE_DRIVER | default "sqlite") "sqlite") }}
            - name: AA_DB_PATH
              value: "{{ .Values.persistence.mountPath }}/automatic-agent.db"
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "automatic-agent.fullname" . }}-config
            {{- if eq (include "automatic-agent.hasSecretEnv" .) "true" }}
            - secretRef:
                name: {{ include "automatic-agent.fullname" . }}-secrets
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            {{- toYaml (omit .Values.livenessProbe "enabled") | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            {{- toYaml (omit .Values.readinessProbe "enabled") | nindent 12 }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            {{- toYaml (omit .Values.startupProbe "enabled") | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            - name: tmp
              mountPath: /tmp
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "{{ .Values.lifecycle.preStopSleepSeconds }}"]
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "automatic-agent.fullname" . }}-data
        {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
