{{- if and .Values.secrets (not .Values.externalSecret.enabled) }}
{{- if and (not .Values.secrets.allowInlineSecrets) (or .Values.secrets.AA_API_JWT_SECRET .Values.secrets.ANTHROPIC_API_KEY .Values.secrets.OPENAI_API_KEY .Values.secrets.MINIMAX_API_KEY) }}
{{- fail "Inline secrets are disabled by default. Set secrets.allowInlineSecrets=true only for explicitly non-production use." }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "automatic-agent.fullname" . }}-secrets
  labels:
    {{- include "automatic-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.AA_API_JWT_SECRET }}
  AA_API_JWT_SECRET: {{ .Values.secrets.AA_API_JWT_SECRET }}
  {{- end }}
  {{- if .Values.secrets.ANTHROPIC_API_KEY }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.ANTHROPIC_API_KEY }}
  {{- end }}
  {{- if .Values.secrets.OPENAI_API_KEY }}
  OPENAI_API_KEY: {{ .Values.secrets.OPENAI_API_KEY }}
  {{- end }}
  {{- if .Values.secrets.MINIMAX_API_KEY }}
  MINIMAX_API_KEY: {{ .Values.secrets.MINIMAX_API_KEY }}
  {{- end }}
{{- end }}
