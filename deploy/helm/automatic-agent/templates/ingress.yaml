{{- if .Values.ingress.enabled -}}
{{- $domain := required "ingress.domain must be set when ingress is enabled" .Values.ingress.domain -}}
{{- $hosts := .Values.ingress.hosts | default (list) -}}
{{- if eq (len $hosts) 0 -}}
{{- $hosts = list (dict "host" $domain "paths" (list (dict "path" "/" "pathType" "Prefix"))) -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "automatic-agent.fullname" . }}
  labels:
    {{- include "automatic-agent.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if and .Values.ingress.requireTls (eq (len (.Values.ingress.tls | default (list))) 0) }}
  {{- fail "ingress.tls must be configured when ingress.requireTls=true" }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- $tlsHosts := .hosts | default (list $domain) }}
        {{- range $tlsHosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range $hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "automatic-agent.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
