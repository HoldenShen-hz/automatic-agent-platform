# Pre-production values for automatic-agent

replicaCount: 2

image:
  registry: ghcr.io
  repository: automatic-agent-platform
  pullPolicy: IfNotPresent
  tag: ""
  digest: ""

resources:
  limits:
    cpu: "2"
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  customMetrics:
    - type: Pods
      pods:
        metric:
          name: queued_tasks
        target:
          type: AverageValue
          averageValue: "75"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  domain: preprod.automatic-agent.example.com
  hosts:
    - host: preprod.automatic-agent.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: automatic-agent-preprod-tls
      hosts:
        - preprod.automatic-agent.example.com
  requireTls: true

env:
  AA_API_HOST: "0.0.0.0"
  AA_API_PORT: "3000"
  AA_METRICS_PORT: "9090"
  AA_LOG_LEVEL: "info"
  AA_STORAGE_DRIVER: "postgres"
  AA_OTEL_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4318/v1/traces"
  NODE_ENV: "pre-production"

externalSecret:
  enabled: true
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  data:
    - secretKey: AA_API_JWT_SECRET
      remoteRef:
        key: automatic-agent/pre-prod/api
        property: jwt_secret
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: automatic-agent/pre-prod/providers
        property: openai_api_key
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: automatic-agent/pre-prod/providers
        property: anthropic_api_key
    - secretKey: AA_STORAGE_POSTGRES_DSN
      remoteRef:
        key: automatic-agent/pre-prod/storage
        property: postgres_dsn

persistence:
  enabled: false

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

monitoring:
  serviceMonitor:
    enabled: true
  prometheusRule:
    enabled: true

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: automatic-agent
        topologyKey: kubernetes.io/hostname
