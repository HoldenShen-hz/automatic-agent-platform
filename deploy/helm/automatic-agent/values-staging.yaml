# Staging values for automatic-agent

replicaCount: 2

image:
  repository: ghcr.io/holdenshen-hz/automatic-agent-platform
  pullPolicy: Always
  tag: ""  # Set by CI from image_tag

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: staging.automatic-agent.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: automatic-agent-staging-tls
      hosts:
        - staging.automatic-agent.example.com

env:
  AA_API_HOST: "0.0.0.0"
  AA_API_PORT: "3000"
  AA_LOG_LEVEL: "info"
  AA_STORAGE_DRIVER: "sqlite"
  NODE_ENV: "staging"

persistence:
  enabled: true
  size: 20Gi

podDisruptionBudget:
  enabled: true
  minAvailable: 1
