name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    # Weekly baseline/security sweep at Monday 05:00 UTC (Monday 13:00 Asia/Shanghai).
    - cron: "0 5 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_REGISTRY: ${{ format('{0}/{1}', vars.CONTAINER_REGISTRY_HOST != '' && vars.CONTAINER_REGISTRY_HOST || 'ghcr.io', vars.CONTAINER_REGISTRY_NAMESPACE != '' && vars.CONTAINER_REGISTRY_NAMESPACE || github.repository_owner) }}
      IMAGE_REPOSITORY: automatic-agent-platform
      IMAGE_TAG: ci-${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Architecture Boundary Lint
        run: npm run lint:architecture-boundary

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Build Docker image for downstream security scan
        run: docker build -t "${IMAGE_REGISTRY}/${IMAGE_REPOSITORY}:${IMAGE_TAG}" .

      - name: Changelog Gate
        run: npm run changelog:check

      - name: Repository Hygiene Gates
        run: npm run audit:repo-hygiene

      - name: Test
        run: npm run test:raw

      - name: Coverage Gate
        run: npm run coverage:gate

      - name: Stable validation
        run: AA_VALIDATION_ITERATIONS=2 npm run validate:stable:compiled

      - name: Generate artifact integrity manifest
        if: always()
        run: |
          mkdir -p test-results
          {
            find test-results coverage -type f -print0 2>/dev/null | xargs -0 shasum -a 256
          } > test-results/artifact-sha256.txt || true
          docker save "${IMAGE_REGISTRY}/${IMAGE_REPOSITORY}:${IMAGE_TAG}" -o test-results/container-image.tar
          shasum -a 256 test-results/container-image.tar >> test-results/artifact-sha256.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: test-results-node-22
          retention-days: 14
          path: |
            test-results/
            coverage/

  pg-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: aa_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test -d aa_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:pg-integration
        env:
          AA_TEST_PG_DSN: postgresql://test:test@127.0.0.1:5433/aa_test
          AA_STORAGE_POSTGRES_DSN: postgresql://test:test@127.0.0.1:5433/aa_test

  mutation-test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run stryker
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: mutation-report
          retention-days: 14
          path: reports/mutation/

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  dependency-audit:
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run npm audit
        run: |
          npm audit --audit-level=high --omit=dev --json > npm-audit.json || true
          node scripts/ci/npm-audit-to-sarif.mjs npm-audit.json npm-audit.sarif
          node -e 'const report=require("./npm-audit.json"); const count=Object.keys(report.vulnerabilities ?? {}).length; console.log(`audit_vulnerabilities=${count}`); if (count > 0) process.exit(1);'
      - name: Upload npm audit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: npm-audit.sarif
      - name: Upload npm audit raw report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: npm-audit-report
          retention-days: 14
          path: |
            npm-audit.json
            npm-audit.sarif

  trivy-scan:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      IMAGE_REGISTRY: ${{ format('{0}/{1}', vars.CONTAINER_REGISTRY_HOST != '' && vars.CONTAINER_REGISTRY_HOST || 'ghcr.io', vars.CONTAINER_REGISTRY_NAMESPACE != '' && vars.CONTAINER_REGISTRY_NAMESPACE || github.repository_owner) }}
      IMAGE_REPOSITORY: automatic-agent-platform
      IMAGE_TAG: ci-${{ github.sha }}
    steps:
      - name: Download validated image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: test-results-node-22
          path: test-results

      - name: Load validated Docker image
        run: docker load --input test-results/container-image.tar

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: 1
