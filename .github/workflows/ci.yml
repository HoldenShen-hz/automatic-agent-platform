name: CI

on:
  workflow_call:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    # Weekly baseline/security sweep at Monday 05:00 UTC (Monday 13:00 Asia/Shanghai).
    - cron: "0 5 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Architecture Boundary Lint
        run: npm run lint:architecture-boundary

      - name: Typecheck
        run: npm run typecheck

      - name: Changelog Gate
        run: npm run changelog:check

      - name: Repository Hygiene Gates
        run: npm run audit:repo-hygiene

      - name: Test
        run: npm run test:raw

      - name: Coverage Gate
        run: npm run coverage:gate

      - name: Stable validation
        run: AA_VALIDATION_ITERATIONS=2 npm run validate:stable:compiled

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-22
          path: |
            test-results/
            coverage/

  pg-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: aa_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test -d aa_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:pg-integration
        env:
          AA_TEST_PG_DSN: postgresql://test:test@127.0.0.1:5433/aa_test

  mutation-test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run stryker
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  dependency-audit:
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run npm audit
        run: |
          npm audit --audit-level=high --omit=dev --json > npm-audit.json || true
          node scripts/ci/npm-audit-to-sarif.mjs npm-audit.json npm-audit.sarif
          node -e 'const report=require("./npm-audit.json"); const count=Object.keys(report.vulnerabilities ?? {}).length; console.log(`audit_vulnerabilities=${count}`); if (count > 0) process.exit(1);'
      - name: Upload npm audit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: npm-audit.sarif
      - name: Upload npm audit raw report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: |
            npm-audit.json
            npm-audit.sarif

  trivy-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t automatic-agent .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: automatic-agent
          severity: CRITICAL,HIGH
          exit-code: 1
