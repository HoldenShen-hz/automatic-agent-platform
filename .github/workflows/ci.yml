name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    # Weekly baseline/security sweep at Monday 05:00 UTC (Monday 13:00 Asia/Shanghai).
    - cron: "0 5 * * 1"

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  validate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_REGISTRY: ${{ format('{0}/{1}', vars.CONTAINER_REGISTRY_HOST != '' && vars.CONTAINER_REGISTRY_HOST || 'ghcr.io', vars.CONTAINER_REGISTRY_NAMESPACE != '' && vars.CONTAINER_REGISTRY_NAMESPACE || github.repository_owner) }}
      IMAGE_REPOSITORY: automatic-agent-platform
      IMAGE_TAG: ci-${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Architecture Boundary Lint
        run: npm run lint:architecture-boundary

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Build Docker image for downstream security scan
        if: github.event_name != 'pull_request'
        run: docker build -t "${IMAGE_REGISTRY}/${IMAGE_REPOSITORY}:${IMAGE_TAG}" .

      - name: Changelog Gate
        run: npm run changelog:check

      - name: Repository Hygiene Gates
        run: npm run audit:repo-hygiene

      - name: Division Inventory
        run: npm run audit:division-inventory

      - name: Coverage Cards
        run: npm run coverage:cards

      - name: Domain Coverage Warning Gate
        run: npm run audit:domain-coverage

      - name: P0 Domain Coverage Blocking Gate
        run: npm run audit:domain-coverage:p0

      - name: Test
        env:
          AA_RUNNING_TESTS: "1"
        run: npm run test:raw

      - name: Coverage Gate
        env:
          AA_RUNNING_TESTS: "1"
        run: npm run coverage:gate

      - name: Stable validation
        run: AA_VALIDATION_ITERATIONS=2 npm run validate:stable:compiled

      - name: Generate artifact integrity manifest
        if: always()
        run: |
          mkdir -p test-results
          {
            find test-results coverage -type f -print0 2>/dev/null | xargs -0 shasum -a 256
          } > test-results/artifact-sha256.txt || true
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            docker save "${IMAGE_REGISTRY}/${IMAGE_REPOSITORY}:${IMAGE_TAG}" -o test-results/container-image.tar
            shasum -a 256 test-results/container-image.tar >> test-results/artifact-sha256.txt
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: test-results-node-22
          retention-days: 14
          if-no-files-found: error
          compression-level: 6
          path: |
            test-results/
            coverage/
            config/division-coverage/inventory/
            config/division-coverage/reports/

  terraform-validate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: deploy/terraform
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  pg-integration:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: aa_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test -d aa_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run test:pg-integration
        env:
          AA_TEST_PG_DSN: postgresql://test:test@127.0.0.1:5433/aa_test
          AA_STORAGE_POSTGRES_DSN: postgresql://test:test@127.0.0.1:5433/aa_test

  mutation-test:
    permissions:
      contents: read
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run stryker
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: mutation-report
          retention-days: 14
          path: reports/mutation/

  security:
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@fee9466b8957867761f2d78f922ab084e3e2dd17
        with:
          languages: typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@fee9466b8957867761f2d78f922ab084e3e2dd17

  dependency-audit:
    permissions:
      contents: read
      security-events: write
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run npm audit
        run: |
          npm audit --audit-level=high --omit=dev --json > npm-audit.json || true
          node scripts/ci/npm-audit-to-sarif.mjs npm-audit.json npm-audit.sarif
          node --input-type=module -e 'import { readFileSync } from "node:fs"; const report = JSON.parse(readFileSync("./npm-audit.json", "utf8")); const severities = new Set(["high", "critical"]); const count = Object.values(report.vulnerabilities ?? {}).filter((entry) => severities.has(String(entry?.severity ?? "").toLowerCase())).length; console.log(`audit_high_or_critical_vulnerabilities=${count}`); if (count > 0) process.exit(1);'
      - name: Upload npm audit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@fee9466b8957867761f2d78f922ab084e3e2dd17
        with:
          sarif_file: npm-audit.sarif
      - name: Upload npm audit raw report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: npm-audit-report
          retention-days: 14
          path: |
            npm-audit.json
            npm-audit.sarif

  trivy-scan:
    permissions:
      contents: read
      security-events: write
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      IMAGE_REGISTRY: ${{ format('{0}/{1}', vars.CONTAINER_REGISTRY_HOST != '' && vars.CONTAINER_REGISTRY_HOST || 'ghcr.io', vars.CONTAINER_REGISTRY_NAMESPACE != '' && vars.CONTAINER_REGISTRY_NAMESPACE || github.repository_owner) }}
      IMAGE_REPOSITORY: automatic-agent-platform
      IMAGE_TAG: ci-${{ github.sha }}
    steps:
      - name: Download validated image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: test-results-node-22
          path: test-results

      - name: Load validated Docker image
        run: docker load --input test-results/container-image.tar

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: sarif
          output: trivy-results.sarif
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@fee9466b8957867761f2d78f922ab084e3e2dd17
        with:
          sarif_file: trivy-results.sarif
      - name: Upload Trivy raw report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: trivy-results
          retention-days: 14
          if-no-files-found: error
          path: trivy-results.sarif
