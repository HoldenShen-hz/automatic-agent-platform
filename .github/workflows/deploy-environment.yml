name: Deploy to Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, test, staging, pre-prod, prod]
      public_domain:
        description: 'Ingress public domain override for ingress-enabled environments'
        required: false
        type: string
      image_tag:
        description: 'Image tag to deploy'
        required: true
        type: string
      rollout_strategy:
        description: 'Rollout strategy'
        required: true
        type: choice
        options: [rolling, canary, blue_green]
      deployment_secret_ref:
        description: 'Deployment secret ref'
        required: true
        type: string
      config_bundle_ref:
        description: 'Config bundle ref'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.environment }}-${{ inputs.rollout_strategy }}
  cancel-in-progress: false

jobs:
  validate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Validate workflow inputs
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          DEPLOYMENT_SECRET_REF: ${{ inputs.deployment_secret_ref }}
          CONFIG_BUNDLE_REF: ${{ inputs.config_bundle_ref }}
          PUBLIC_DOMAIN: ${{ inputs.public_domain }}
        run: |
          set -euo pipefail
          [[ "${IMAGE_TAG}" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$ ]] || {
            echo "::error::Invalid image_tag"; exit 1;
          }
          [[ "${DEPLOYMENT_SECRET_REF}" =~ ^[A-Za-z0-9][A-Za-z0-9._:/-]{0,255}$ ]] || {
            echo "::error::Invalid deployment_secret_ref"; exit 1;
          }
          [[ "${CONFIG_BUNDLE_REF}" =~ ^[A-Za-z0-9][A-Za-z0-9._:/-]{0,255}$ ]] || {
            echo "::error::Invalid config_bundle_ref"; exit 1;
          }
          if [[ -n "${PUBLIC_DOMAIN}" ]] && [[ ! "${PUBLIC_DOMAIN}" =~ ^[A-Za-z0-9.-]+$ ]]; then
            echo "::error::Invalid public_domain"
            exit 1
          fi
      - name: Wait for image to become available
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          IMAGE_REGISTRY: ${{ format('{0}/{1}', vars.CONTAINER_REGISTRY_HOST != '' && vars.CONTAINER_REGISTRY_HOST || 'ghcr.io', vars.CONTAINER_REGISTRY_NAMESPACE != '' && vars.CONTAINER_REGISTRY_NAMESPACE || github.repository_owner) }}
          IMAGE_REPOSITORY: ${{ github.event.repository.name }}
        run: |
          IMAGE_REF="${IMAGE_REGISTRY}/${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          for attempt in $(seq 1 30); do
            if docker manifest inspect "${IMAGE_REF}" >/dev/null 2>&1; then
              echo "Image available: ${IMAGE_REF}"
              exit 0
            fi
            echo "Waiting for image availability (${attempt}/30): ${IMAGE_REF}"
            sleep 10
          done
          echo "::error::Image not available after waiting: ${IMAGE_REF}"
          exit 1

  deployment-preflight:
    permissions:
      contents: read
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    steps:
      - name: Validate deployment environment secrets
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
          PUBLIC_DOMAIN_SECRET: ${{ secrets.PUBLIC_DOMAIN }}
          PUBLIC_DOMAIN_VAR: ${{ vars.PUBLIC_DOMAIN }}
          PUBLIC_DOMAIN_INPUT: ${{ inputs.public_domain }}
          DEPLOY_ENV: ${{ inputs.environment }}
        run: |
          missing=()
          for name in AWS_DEPLOY_ROLE_ARN AWS_REGION EKS_CLUSTER_NAME; do
            if [ -z "${!name}" ]; then
              missing+=("${name}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing GitHub environment secrets for deployment: ${missing[*]}"
            echo "::error::Deployment binding is not complete for environment=${{ inputs.environment }}"
            exit 1
          fi
          PUBLIC_DOMAIN="${PUBLIC_DOMAIN_INPUT:-${PUBLIC_DOMAIN_SECRET:-${PUBLIC_DOMAIN_VAR:-}}}"
          if [[ "$DEPLOY_ENV" =~ ^(staging|pre-prod|prod)$ ]] && [ -z "${PUBLIC_DOMAIN}" ]; then
            echo "::error::Missing PUBLIC_DOMAIN input/secret/variable for ingress-enabled environment=${DEPLOY_ENV}"
            exit 1
          fi

  deploy:
    permissions:
      contents: read
      id-token: write
    needs: deployment-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    env:
      DEPLOY_ENV: ${{ inputs.environment }}
      ROLLOUT_STRATEGY: ${{ inputs.rollout_strategy }}
      DEPLOYMENT_AUTH_TOKEN: ${{ inputs.deployment_secret_ref }}
      CONFIG_BUNDLE_REF: ${{ inputs.config_bundle_ref }}
      IMAGE_REGISTRY: ${{ format('{0}/{1}', vars.CONTAINER_REGISTRY_HOST != '' && vars.CONTAINER_REGISTRY_HOST || 'ghcr.io', vars.CONTAINER_REGISTRY_NAMESPACE != '' && vars.CONTAINER_REGISTRY_NAMESPACE || github.repository_owner) }}
      IMAGE_REPOSITORY: ${{ github.event.repository.name }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
      IMAGE_TAG: ${{ inputs.image_tag }}
      PUBLIC_DOMAIN: ${{ inputs.public_domain != '' && inputs.public_domain || secrets.PUBLIC_DOMAIN != '' && secrets.PUBLIC_DOMAIN || vars.PUBLIC_DOMAIN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@c0c8b32d33a5244f1e5947304550403b63930415
        with:
          version: '1.31.8'

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Verify kube context
        run: kubectl config get-contexts

      - name: Setup Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a
        with:
          version: '3.16.3'

      - name: Set deployment namespace
        id: namespace
        run: |
          case "$DEPLOY_ENV" in
            pre-prod)
              echo "namespace=automatic-agent-pre-prod" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "namespace=automatic-agent-$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Resolve rollout target
        id: rollout
        run: |
          STRATEGY="$ROLLOUT_STRATEGY"
          if [ "$STRATEGY" = "canary" ]; then
            echo "release_name=automatic-agent-canary" >> "$GITHUB_OUTPUT"
            echo "fullname_override=automatic-agent-canary" >> "$GITHUB_OUTPUT"
            echo "replica_count=1" >> "$GITHUB_OUTPUT"
            echo "rollout_strategy=canary" >> "$GITHUB_OUTPUT"
          elif [ "$STRATEGY" = "blue_green" ]; then
            CURRENT_SELECTOR=$(kubectl get svc automatic-agent -n "${{ steps.namespace.outputs.namespace }}" -o jsonpath='{.spec.selector.app\.kubernetes\.io/instance}' 2>/dev/null || echo "")
            SLOT="blue"
            if [ "$CURRENT_SELECTOR" = "automatic-agent-green" ]; then
              SLOT="blue"
            elif [ "$CURRENT_SELECTOR" = "automatic-agent-blue" ]; then
              SLOT="green"
            fi
            echo "release_name=automatic-agent-${SLOT}" >> "$GITHUB_OUTPUT"
            echo "fullname_override=automatic-agent-${SLOT}" >> "$GITHUB_OUTPUT"
            echo "replica_count=2" >> "$GITHUB_OUTPUT"
            echo "rollout_strategy=blue_green" >> "$GITHUB_OUTPUT"
            echo "slot=${SLOT}" >> "$GITHUB_OUTPUT"
            echo "inactive_slot=$([ "$SLOT" = "blue" ] && echo "green" || echo "blue")" >> "$GITHUB_OUTPUT"
          else
            echo "release_name=automatic-agent" >> "$GITHUB_OUTPUT"
            echo "fullname_override=" >> "$GITHUB_OUTPUT"
            echo "replica_count=1" >> "$GITHUB_OUTPUT"
            echo "rollout_strategy=rolling" >> "$GITHUB_OUTPUT"
          fi

      - name: Create namespace if not exists
        run: kubectl create namespace ${{ steps.namespace.outputs.namespace }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          HELM_ARGS=(
            upgrade --install "${{ steps.rollout.outputs.release_name }}"
            deploy/helm/automatic-agent
            --namespace "${{ steps.namespace.outputs.namespace }}"
            --create-namespace
            -f "deploy/helm/automatic-agent/values-${DEPLOY_ENV}.yaml"
            --set-string "image.tag=${IMAGE_TAG}"
            --set-string "image.registry=${IMAGE_REGISTRY}"
            --set-string "image.repository=${IMAGE_REPOSITORY}"
            --set-string "env.AA_BUILD_COMMIT=${{ github.sha }}"
            --set-string "env.AA_BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            --set-string "rolloutStrategy=${{ steps.rollout.outputs.rollout_strategy }}"
            --set-string "replicaCount=${{ steps.rollout.outputs.replica_count }}"
            --wait
            --timeout 10m
            --debug
          )
          if [ -n "${PUBLIC_DOMAIN}" ]; then
            HELM_ARGS+=(--set-string "ingress.domain=${PUBLIC_DOMAIN}")
          fi
          if [ -n "${{ steps.rollout.outputs.fullname_override }}" ]; then
            HELM_ARGS+=(--set-string "fullnameOverride=${{ steps.rollout.outputs.fullname_override }}")
          fi
          helm "${HELM_ARGS[@]}"

      - name: Verify deployment
        run: |
          DEPLOYMENT_NAME="${{ steps.rollout.outputs.fullname_override }}"
          if [ -z "$DEPLOYMENT_NAME" ]; then
            DEPLOYMENT_NAME="automatic-agent"
          fi
          kubectl rollout status deployment/${DEPLOYMENT_NAME} \
            -n ${{ steps.namespace.outputs.namespace }} \
            --timeout=300s

      - name: Promote rollout
        run: |
          STRATEGY="$ROLLOUT_STRATEGY"
          NAMESPACE="${{ steps.namespace.outputs.namespace }}"
          if [ "$STRATEGY" = "canary" ]; then
            helm upgrade --install automatic-agent deploy/helm/automatic-agent \
              --namespace "$NAMESPACE" \
              -f "deploy/helm/automatic-agent/values-${DEPLOY_ENV}.yaml" \
              --set-string "image.tag=${IMAGE_TAG}" \
              --set-string "image.registry=${IMAGE_REGISTRY}" \
              --set-string "image.repository=${IMAGE_REPOSITORY}" \
              --set-string "rolloutStrategy=rolling" \
              --wait --timeout 10m
            helm uninstall automatic-agent-canary --namespace "$NAMESPACE" || true
          elif [ "$STRATEGY" = "blue_green" ]; then
            kubectl patch svc automatic-agent -n "$NAMESPACE" --type merge \
              -p "{\"spec\":{\"selector\":{\"app.kubernetes.io/name\":\"automatic-agent\",\"app.kubernetes.io/instance\":\"automatic-agent-${{ steps.rollout.outputs.slot }}\"}}}"
            helm uninstall "automatic-agent-${{ steps.rollout.outputs.inactive_slot }}" --namespace "$NAMESPACE" || true
          fi

      - name: Health check
        run: |
          SERVICE_NAME="${{ steps.rollout.outputs.fullname_override }}"
          if [ -z "$SERVICE_NAME" ]; then
            SERVICE_NAME="automatic-agent"
          fi
          for i in $(seq 1 30); do
            ENDPOINT_COUNT=$(kubectl get endpoints "${SERVICE_NAME}" \
              -n "${{ steps.namespace.outputs.namespace }}" \
              -o jsonpath='{.subsets[*].addresses[*].ip}' 2>/dev/null | awk '{print NF}')
            if [ "${ENDPOINT_COUNT:-0}" -gt 0 ]; then
              echo "Endpoint health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Endpoint health check failed"
          exit 1

      - name: Post-promotion health gate
        run: |
          kubectl rollout status deployment/automatic-agent \
            -n "${{ steps.namespace.outputs.namespace }}" \
            --timeout=300s
          for i in $(seq 1 30); do
            ENDPOINT_COUNT=$(kubectl get endpoints "automatic-agent" \
              -n "${{ steps.namespace.outputs.namespace }}" \
              -o jsonpath='{.subsets[*].addresses[*].ip}' 2>/dev/null | awk '{print NF}')
            if [ "${ENDPOINT_COUNT:-0}" -gt 0 ]; then
              echo "Post-promotion endpoint health gate passed"
              exit 0
            fi
            sleep 10
          done
          echo "Post-promotion endpoint health gate failed"
          exit 1

      - name: Record deployment info
        run: |
          echo "Deployed image: ${IMAGE_REGISTRY}/${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          echo "Environment: ${DEPLOY_ENV}"
          echo "Rollout strategy: ${ROLLOUT_STRATEGY}"
          echo "Release name: ${{ steps.rollout.outputs.release_name }}"
          echo "Build commit: ${{ github.sha }}"
          echo "Build timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  rollback:
    permissions:
      contents: read
      id-token: write
    needs: deploy
    if: ${{ always() && needs.deploy.result == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    env:
      DEPLOY_ENV: ${{ inputs.environment }}
      ROLLOUT_STRATEGY: ${{ inputs.rollout_strategy }}
      DEPLOYMENT_AUTH_TOKEN: ${{ inputs.deployment_secret_ref }}
      CONFIG_BUNDLE_REF: ${{ inputs.config_bundle_ref }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup kubectl
        uses: azure/setup-kubectl@c0c8b32d33a5244f1e5947304550403b63930415
        with:
          version: '1.31.8'
      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"
      - name: Setup Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a
        with:
          version: '3.16.3'
      - name: Set namespace
        id: namespace
        run: |
          case "$DEPLOY_ENV" in
            pre-prod)
              echo "namespace=automatic-agent-pre-prod" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "namespace=automatic-agent-$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
              ;;
          esac
      - name: Rollback
        run: |
          RELEASE_NAME="automatic-agent"
          if [ "$ROLLOUT_STRATEGY" = "canary" ]; then
            RELEASE_NAME="automatic-agent-canary"
          elif [ "$ROLLOUT_STRATEGY" = "blue_green" ]; then
            CURRENT_SELECTOR=$(kubectl get svc automatic-agent -n "${{ steps.namespace.outputs.namespace }}" -o jsonpath='{.spec.selector.app\.kubernetes\.io/instance}' 2>/dev/null || echo "")
            RELEASE_NAME="${CURRENT_SELECTOR:-automatic-agent}"
          fi
          PREVIOUS_REVISION=$(helm history "${RELEASE_NAME}" --namespace "${{ steps.namespace.outputs.namespace }}" -o json \
            | node -e 'const history=JSON.parse(require("fs").readFileSync(0,"utf8")); const deployed=history.filter((row)=>row.status==="deployed"||row.status==="superseded"); const previous=deployed.length >= 2 ? deployed[deployed.length - 2].revision : null; if (previous != null) process.stdout.write(String(previous));')
          if [ -z "${PREVIOUS_REVISION}" ]; then
            echo "::warning::No previous Helm revision available for ${RELEASE_NAME}; skipping rollback."
            exit 0
          fi
          helm rollback ${RELEASE_NAME} ${PREVIOUS_REVISION} \
            --namespace "${{ steps.namespace.outputs.namespace }}" \
            --wait --timeout 5m
          echo "::warning::Deployment failed — rolled back to previous release"
