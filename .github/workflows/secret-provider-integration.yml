name: Secret Provider Integration

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

concurrency:
  group: secret-provider-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-provider-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Mask inline test secrets
        env:
          AA_TEST_VAULT_INLINE_SECRETS: ${{ secrets.AA_TEST_VAULT_INLINE_SECRETS }}
          AA_TEST_KMS_INLINE_SECRETS: ${{ secrets.AA_TEST_KMS_INLINE_SECRETS }}
        run: |
          node --input-type=module <<'EOF'
          const mask = (value) => {
            if (value == null) return;
            const text = String(value);
            if (text.length > 0) {
              console.log(`::add-mask::${text}`);
            }
          };
          const visit = (value) => {
            if (Array.isArray(value)) {
              value.forEach(visit);
              return;
            }
            if (value != null && typeof value === "object") {
              Object.values(value).forEach(visit);
              return;
            }
            mask(value);
          };
          for (const raw of [process.env.AA_TEST_VAULT_INLINE_SECRETS, process.env.AA_TEST_KMS_INLINE_SECRETS]) {
            mask(raw);
            if (!raw) continue;
            try {
              visit(JSON.parse(raw));
            } catch {
              // Ignore non-JSON secrets and keep the whole-value mask above.
            }
          }
          EOF
      - run: npm run test:secret-providers
        env:
          AA_TEST_VAULT_INLINE_SECRETS: ${{ secrets.AA_TEST_VAULT_INLINE_SECRETS }}
          AA_TEST_KMS_INLINE_SECRETS: ${{ secrets.AA_TEST_KMS_INLINE_SECRETS }}
