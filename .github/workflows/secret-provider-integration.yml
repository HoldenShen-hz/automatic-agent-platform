name: Secret Provider Integration

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-provider-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-provider-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Mask inline test secrets
        env:
          AA_TEST_VAULT_INLINE_SECRETS: ${{ secrets.AA_TEST_VAULT_INLINE_SECRETS }}
          AA_TEST_KMS_INLINE_SECRETS: ${{ secrets.AA_TEST_KMS_INLINE_SECRETS }}
        run: |
          echo "::add-mask::${AA_TEST_VAULT_INLINE_SECRETS}"
          echo "::add-mask::${AA_TEST_KMS_INLINE_SECRETS}"
      - run: npm run test:secret-providers
        env:
          AA_TEST_VAULT_INLINE_SECRETS: ${{ secrets.AA_TEST_VAULT_INLINE_SECRETS }}
          AA_TEST_KMS_INLINE_SECRETS: ${{ secrets.AA_TEST_KMS_INLINE_SECRETS }}
