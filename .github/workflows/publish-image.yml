name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        type: string
      image_tag:
        description: 'Image tag'
        required: true
        type: string
      image_repository:
        description: 'Image repository'
        required: true
        type: string
      registry_secret_ref:
        description: 'Registry secret ref'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  publish:
    runs-on: ubuntu-latest
    needs: preflight
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }}
    env:
      REGISTRY: ghcr.io/holdenshen-hz
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Login to Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push
        run: |
          IMAGE_REF="${REGISTRY}/${{ inputs.image_repository }}:${{ inputs.image_tag }}"
          docker build -t "${IMAGE_REF}" .
          docker push "${IMAGE_REF}"
