name: DR Validation

on:
  schedule:
    # Run monthly DR drill at 3 AM on the 15th of each month
    - cron: '0 3 15 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'DR drill mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - incremental
          - verify
      component:
        description: 'Component to test'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - events
          - truth
          - projections

permissions:
  contents: read

concurrency:
  group: dr-validation-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  dr-drill:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create data directories
        run: |
          mkdir -p data
          mkdir -p .dr-reports
          mkdir -p .backups
          mkdir -p .dr-logs
          mkdir -p data/projections

      - name: Initialize test databases
        run: |
          # Seed a non-trivial dataset so restore validation proves more than
          # a single placeholder row.
          if ! command -v sqlite3 >/dev/null 2>&1; then
            echo "sqlite3 is required for DR validation"
            exit 1
          fi
          sqlite3 data/events.db "CREATE TABLE IF NOT EXISTS events (id TEXT PRIMARY KEY, eventType TEXT, taskId TEXT, payloadJson TEXT, createdAt TEXT);"
          sqlite3 data/truth.db "CREATE TABLE IF NOT EXISTS tasks (taskId TEXT PRIMARY KEY, status TEXT, createdAt TEXT);"
          sqlite3 data/events.db "DELETE FROM events;"
          sqlite3 data/truth.db "DELETE FROM tasks;"
          sqlite3 data/events.db "INSERT INTO events VALUES
            ('evt_test_1', 'task:created', 'task_1', '{\"stage\":\"created\"}', '$(date -Iseconds)'),
            ('evt_test_2', 'task:queued', 'task_1', '{\"stage\":\"queued\"}', '$(date -Iseconds)'),
            ('evt_test_3', 'task:completed', 'task_2', '{\"stage\":\"completed\"}', '$(date -Iseconds)');"
          sqlite3 data/truth.db "INSERT INTO tasks VALUES
            ('task_1', 'queued', '$(date -Iseconds)'),
            ('task_2', 'completed', '$(date -Iseconds)'),
            ('task_3', 'running', '$(date -Iseconds)');"
          printf '{"taskId":"task_1","status":"queued"}\n' > data/projections/task-1.json
          printf '{"taskId":"task_2","status":"completed"}\n' > data/projections/task-2.json

      - name: Run DR Drill
        id: drill
        env:
          DR_MODE: ${{ inputs.mode || 'full' }}
          DR_COMPONENT: ${{ inputs.component || 'all' }}
          NODE_ENV: test
        run: |
          OUTPUT_DIR=".dr-reports/drill_$(date +%Y%m%d_%H%M%S)"
          echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"
          bash deploy/scripts/dr-drill.sh \
            --mode "$DR_MODE" \
            --component "$DR_COMPONENT" \
            --output-dir "$OUTPUT_DIR"

      - name: Verify restored dataset shape
        run: |
          RESTORE_ROOT="${{ steps.drill.outputs.output_dir }}/restore/data"
          EVENT_COUNT=$(sqlite3 "${RESTORE_ROOT}/events.db" "SELECT COUNT(*) FROM events;")
          TASK_COUNT=$(sqlite3 "${RESTORE_ROOT}/truth.db" "SELECT COUNT(*) FROM tasks;")
          PROJECTION_COUNT=$(find "${RESTORE_ROOT}/projections" -type f | wc -l | tr -d ' ')
          [ "$EVENT_COUNT" -ge 3 ] || { echo "Expected >=3 restored events, got $EVENT_COUNT"; exit 1; }
          [ "$TASK_COUNT" -ge 3 ] || { echo "Expected >=3 restored tasks, got $TASK_COUNT"; exit 1; }
          [ "$PROJECTION_COUNT" -ge 2 ] || { echo "Expected >=2 restored projection files, got $PROJECTION_COUNT"; exit 1; }

      - name: Verify DR Report Generated
        run: |
          REPORT_PATH="$(find .dr-reports -path '*/drill_report.json' -type f | head -1)"
          if [ -z "$REPORT_PATH" ]; then
            echo "DR report not generated"
            exit 1
          fi
          echo "DR report generated successfully: $REPORT_PATH"

      - name: Check RTO/RPO Compliance
        run: |
          REPORT=$(find .dr-reports -name "rto_rpo_report.json" -type f | head -1)
          if [ -z "$REPORT" ]; then
            echo "RTO/RPO report not found"
            exit 1
          fi

          if ! command -v jq >/dev/null 2>&1; then
            echo "jq is required for DR validation"
            exit 1
          fi
          RTO_COMPLIANT=$(jq -r '.rtoCompliance' "$REPORT")
          RPO_COMPLIANT=$(jq -r '.rpoCompliance' "$REPORT")

          echo "RTO Compliance: $RTO_COMPLIANT"
          echo "RPO Compliance: $RPO_COMPLIANT"

          if [ "$RTO_COMPLIANT" != "true" ] || [ "$RPO_COMPLIANT" != "true" ]; then
            echo "RTO/RPO compliance check failed"
            cat "$REPORT"
            exit 1
          fi

          echo "RTO/RPO compliance verified"

      - name: Upload DR Reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: dr-reports-${{ github.run_number }}
          path: |
            .dr-reports/
            .dr-logs/
          retention-days: 90

      - name: DR Drill Summary
        if: always()
        run: |
          SUMMARY=$(find .dr-reports -name "SUMMARY.txt" -type f | head -1)
          if [ -n "$SUMMARY" ]; then
            echo "=== DR Drill Summary ==="
            cat "$SUMMARY"
          fi
