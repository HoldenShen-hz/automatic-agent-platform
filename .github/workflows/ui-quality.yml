name: UI Quality

on:
  pull_request:
    paths:
      - "ui/**"
      - "docs_zh/reviews/ui-design-vs-implementation-review.md"
      - ".github/workflows/ui-quality.yml"
  push:
    branches:
      - main
    paths:
      - "ui/**"
      - "docs_zh/reviews/ui-design-vs-implementation-review.md"
      - ".github/workflows/ui-quality.yml"

permissions:
  contents: read

concurrency:
  group: ui-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run test:cross-platform
      - run: npm run build
      - run: npm run bundle:analyze
      - run: npm run perf:budget
      - run: npm exec playwright install --with-deps chromium firefox webkit
      - name: Start preview server
        run: |
          mkdir -p test-results
          nohup npm --workspace @aa/web run preview -- --host 127.0.0.1 --port 4173 > test-results/ui-preview.log 2>&1 &
          PREVIEW_PID=$!
          echo "$PREVIEW_PID" > test-results/ui-preview.pid
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4173 >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          cat test-results/ui-preview.log
          exit 1
      - name: Lighthouse
        uses: treosh/lighthouse-ci-action@512cc908a55bfb0ad231facca52adf3d3a651df4
        with:
          urls: |
            http://127.0.0.1:4173/
          uploadArtifacts: true
          temporaryPublicStorage: false
      - run: npm run test:a11y
      - run: npm run test:visual
      - name: Stop preview server
        if: always()
        run: |
          if [ -f test-results/ui-preview.pid ]; then
            kill "$(cat test-results/ui-preview.pid)" 2>/dev/null || true
          fi
      - name: Upload UI test artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ui-quality-artifacts
          retention-days: 14
          path: |
            ui/playwright-report/
            ui/test-results/
            ui/test-results/ui-preview.log
